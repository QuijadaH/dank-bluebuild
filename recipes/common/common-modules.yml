---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - dconf
        - fastfetch
        - file-roller
        - firewall-config
        - gparted
        - gvfs
        - gvfs-archive
        - libgsf 
        - mediainfo
        - p7zip
        - p7zip-plugins
        - poppler-glib
        - seahorse
        - thunar
        - thunar-archive-plugin
        - thunar-media-tags-plugin
        - thunar-vcs-plugin
        - thunar-volman
        - trash-cli 
        - tumbler
        - udisks2
        - unrar
        - webp-pixbuf-loader
      exclude:
        - gnome-shell    

  - type: default-flatpaks
    configurations:
      - scope: user
        install:
          # - io.github.celluloid_player.Celluloid    # Somehow causes build to fail because it can't find the Flatpak.
          - io.github.diegopvlk.Cine
          - org.onlyoffice.desktopeditors
          - org.gnome.Loupe
          - org.mozilla.firefox
          - org.gnome.Papers