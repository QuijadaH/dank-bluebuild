---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

modules:
  - type: files
    files:
      - source: flatpak
        destination: /

  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - dconf
        - fastfetch
        - file-roller
        - firewall-config
        - gparted
        - gvfs
        - gvfs-archive
        - libgsf 
        - mediainfo
        - p7zip
        - p7zip-plugins
        - poppler-glib
        - seahorse
        - thunar
        - thunar-archive-plugin
        - thunar-media-tags-plugin
        - thunar-vcs-plugin
        - thunar-volman
        - trash-cli 
        - tumbler
        - udisks2
        - unrar
        - webp-pixbuf-loader
      exclude:
        - gnome-shell    