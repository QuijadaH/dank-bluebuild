modules:
  - type: dnf
    install:
      packages:
        - dconf
        - desktop-file-utils
        - fastfetch
        - file-roller
        - firewall-config
        - glib2
        - gnome-keyring
        - gnome-keyring-pam
        - gparted
        - gvfs
        - libgsf 
        - libsecret
        - mediainfo
        - nemo
        - nemo-extensions
        - nemo-fileroller
        - nemo-preview 
        - p7zip
        - p7zip-plugins
        - poppler-glib
        - samba-client
        - seahorse
        - shared-mime-info
        - trash-cli 
        - tumbler
        - udisks2
        - unrar
        - webp-pixbuf-loader
        - xdg-terminal-exec
        - xdg-user-dirs
        - xdg-utils
        
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
        install: 
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
      - notify: false
        scope: user
        repo:
          title: Flathub (user)
        install:
          - io.github.celluloid_player.Celluloid
          - org.onlyoffice.desktopeditors
          - org.mozilla.firefox
          - org.gnome.Loupe
          - org.gnome.Papers