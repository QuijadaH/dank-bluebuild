---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: dank-bluebuild-hyprland
description: BlueBuild image for Dank Linux and Hyprland.

base-image: ghcr.io/blue-build/base-images/fedora-base
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        enable:
          - lionheartp/Hyprland
    install:
      install-weak-deps: false
      packages:
      - hyprland
      - hyprland-guiutils
      - grim
      - qt5-qtwayland
      - qt6-qtwayland
      - slurp
      - wev
      - xdg-desktop-portal-hyprland
      - xwaylandvideobridge    # See https://wiki.hypr.land/Useful-Utilities/Screen-Sharing/#xwayland
      
  - from-file: ./common/dms-modules.yml
  - from-file: ./common/hyprpm-modules.yml
  - from-file: ./common/common-modules.yml
        
  - type: script
    snippets:
      - "chmod -R +x /usr/libexec/dank-bluebuild"
      - "chmod +x /usr/libexec/hyprland/restart-portals"
      - "chmod +x /usr/local/bin/post-login-setup"

  - type: systemd
    system:
      enabled:
        - greetd
        - skel-init.service
    user:
      enabled:
        - hyprland-session.target
        - gnome-keyring-daemon.socket
        - dms
        - dsearch

  - type: signing
