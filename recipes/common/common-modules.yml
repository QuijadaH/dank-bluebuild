modules:
  - type: dnf
    install:
      packages:
        - dconf
        - desktop-file-utils
        - fastfetch
        - file-roller
        - firewall-config
        - gparted
        - gvfs
        - libgsf 
        - mediainfo
        - nemo
        - nemo-extensions
        - nemo-fileroller
        - nemo-preview 
        - p7zip
        - p7zip-plugins
        - poppler-glib
        - samba-client
        - seahorse
        - trash-cli 
        - tumbler
        - unrar
        - webp-pixbuf-loader
        
  - type: default-flatpaks
    configurations:
      - scope: user
        install:
          - io.github.celluloid_player.Celluloid
          - org.onlyoffice.desktopeditors
          - org.gnome.Loupe
          - org.mozilla.firefox
          - org.gnome.Papers