---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

modules:
  # Core files
  - type: files
    files:
      - source: system
        destination: /

  # Dank Linux packages
  - type: dnf
    repos:
      copr:
        enable:
            - avengemedia/dms
            - scottames/ghostty
    install:
      packages:
        - dms
        - dms-greeter    
        - acl
        - adw-gtk3-theme
        - cliphist
        - ddcutil
        - ghostty
        - i2c-tools
        - power-profiles-daemon    
        - wl-clipboard

  # Other core packages
  - type: dnf
    install:
      packages:
        - desktop-file-utils
        - glib2
        - gnome-keyring
        - gnome-keyring-pam
        - libsecret
        - shared-mime-info
        - xdg-terminal-exec
        - xdg-user-dirs
        - xdg-utils
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
        install:
          # Core Flatpaks 
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
      - notify: false
        scope: user
        repo:
          title: Flathub (user)

  - type: script
    snippets:
      - "chmod -R +x /usr/libexec/dank-bluebuild"
      - "chmod +x /usr/bin/post-login-setup"

  - type: systemd
    system:
      enabled:
        - greetd
        - skel-init.service
    user:
      enabled:
        - gnome-keyring-daemon.socket
        - dms
        - dsearch
        - user-flatpak-setup.service
      disabled:
        - user-flatpak-setup.timer